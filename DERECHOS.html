   <p>Derechos al ser mayor de edad</p>

<p>Los derechos son libertades y facultades reconocidas por la ley.</p>


<h2>1.Derechos civiles</h2>

<h4>¿Qué son?</h4>

<p>Son los que te permiten actuar legalmente por cuenta propia.</p>

<p>Incluyen:</p>
<ul>
<li> Firmar documentos.</li>
<li> Representarte legalmente.</li>
<li> Tomar decisiones jurídicas.</li>
<li> Administrar tus bienes.</li>
</ul>
<p>En la práctica:</p>

<p>Ya no necesitas autorización de padres o tutores para la mayoría de los trámites.</p>

<h4>¿Por qué son importantes?</h4>

<p>Te convierten en una persona legalmente autónoma.</p>

---

<h2>2.Derechos políticos</h2>

<h4>¿Qué son?</h4>

<p>Son los que te permiten participar en la vida democrática del país.</p>

<p>Incluyen:</p>
<ul>
<li>Votar.
<li>Participar en consultas ciudadanas.</li>
<li>Integrarte a organizaciones sociales.</li>
<li>En algunos casos, aspirar a cargos públicos.</li>
</ul>
<h4>¿Por qué son importantes?<h4>

<p>Porque tu voz influye en decisiones nacionales, estatales y municipales.</p>

<p>En la práctica:</p>

<p>Puedes elegir autoridades y participar activamente en la sociedad.</p>

---

<h2>3.Derechos económicos</h2>

<h4>¿Qué son?</h4>

<p>Son los que te permiten administrar recursos y patrimonio.</p>

<p>Incluyen:</p>
<ul>
<li>Abrir cuentas.</li>
<li>Solicitar créditos.</li>
<li>Invertir.</li>
<li>Comprar bienes.</li>
</ul>
<h4> ¿Por qué son importantes?</h4>

<p>Te permiten construir estabilidad y patrimonio.</p>

<p>En la práctica:</p>

<p>Puedes comprar un vehículo, financiar estudios o comenzar un negocio.</p>

---

<h2>4.Derechos laborales</h2>

<h4>¿Qué son?

Protegen tu desarrollo profesional.</h4>

<p>Incluyen:</p>
<ul>
<li>Elegir empleo.</li>
<li>Firmar contratos.</li>
<li>Recibir salario.</li>
<li>Acceder a prestaciones.</li>
</ul>
<h4>¿Por qué son importantes?<h4>

<p>Garantizan condiciones dignas de trabajo.

<p>En la práctica:</p>

<p>Puedes exigir respeto a tus derechos laborales.</p>

---

<h2>5.Derechos personales y médicos</h2>
<h4>¿Qué son?</h4>

<p>Te permiten decidir sobre tu vida personal y salud.</p>

<p>Incluyen:</p>
<ul>
<li>Autorizar tratamientos médicos.</li>
<li>Elegir residencia.</li>
<li>Decidir sobre estudios o proyectos personales.</li>
</ul>
