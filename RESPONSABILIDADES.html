<h2>1.Responsabilidad legal</h2>

<h4>¿Qué significa?</h4>

<p>Responder ante la ley por tus actos.</p>
<p>Implica:<p>
<ul>
<li> Cumplir contratos.</li>
<li> Respetar leyes.</li>
<li> Responder por daños ocasionados.</li>
</ul>
<p> En la práctica:</p>

<p>Si incumples un contrato o causas daños, puedes enfrentar consecuencias legales.</p>

---

<h2>2.Responsabilidad penal</h2>
<h4>¿Qué significa?</h4>

<p>Ser juzgado como adulto si cometes delitos.</p>

<p>Implica:</p>
<ul>
<li> Sanciones económicas.</li>
<li> Antecedentes legales.</li>
<li> En casos graves, prisión.</li>
</ul>
<p>En la práctica:</p>

<p>Las decisiones impulsivas pueden tener consecuencias permanentes.</p>

---

<h2>3.Responsabilidad financiera</h2>

<h4>¿Qué significa?</h4>

<p>Administrar correctamente tus recursos.</p>

<p>Implica:</p>

 Hacer presupuestos.
 Pagar deudas.
 Ahorrar.
<li> Evitar gastos impulsivos.</p>

<p>En la práctica:</p>

<p>Tus hábitos financieros de hoy pueden afectar oportunidades futuras.</p>

---

<h2>4.Responsabilidad fiscal</h2>

<p>Relacionada con el Servicio de Administración Tributaria</p>

<p>Implica:</p>
<lul>
 <li>Declarar ingresos cuando corresponda.</li>
 <li>Pagar impuestos.</li>
 <li>Mantener información fiscal actualizada.</li>
</ul>
<p>En la práctica:</p>

<p>Ignorar obligaciones fiscales puede generar multas.</p>


<h2>5.Responsabilidad laboral</h2>

<p>Implica:</p>
<ul>
 <li>Cumplir horarios.</li>
 <li>Respetar acuerdos.</li>
 <li>Entregar resultados.</LI>
</ul>
<p>En la práctica:</p>

<p>Tu reputación profesional empieza a construirse desde tu primer empleo.</p>

---

<h2>6.Responsabilidad social y personal</h2>

<p>Implica.</p>
<ul>
 <li>Respetar a otras personas.
 <li>Tomar decisiones conscientes.
 <li>Cuidar tu salud, tiempo y relaciones.
</ul>
<p>En la práctica:</p>

<p>Tu disciplina, hábitos y decisiones empiezan a definir tu futuro.</p>
